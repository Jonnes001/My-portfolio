<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <style>
        body { font-family: Arial, sans-serif; margin:0; padding:0; }
        header, footer { background:#333; color:#fff; text-align:center; padding:15px; }
        nav a { color:#fff; margin:0 15px; text-decoration:none; }
        section { padding:40px; text-align:center; }
        form { max-width:400px; margin:auto; text-align:left; }
        input, textarea { width:100%; padding:10px; margin:10px 0; }
        button { background:#333; color:#fff; padding:10px 20px; border:none; cursor:pointer; }
    </style>
</head>
<body>
    <header>
        <h1>Contact Me</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="skills.html">Skills</a>
            <a href="resume.html">Resume</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section>
        <h2>Get in Touch</h2>
        <form action="mailto:.com" method="post" enctype="text/plain">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Send</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2026 My Portfolio</p>
    </footer>
</body>
</html>
